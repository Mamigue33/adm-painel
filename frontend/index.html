<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADM PAINEL - AuraVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0a0c10; color: #e4e6eb; }
    .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #0f1117; border-right: 1px solid #2a2f3b; transition: 0.3s; z-index: 1000; overflow-y: auto; }
    .sidebar.collapsed { transform: translateX(-260px); }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #2a2f3b; display: flex; justify-content: space-between; }
    .close-sidebar { background: none; border: none; color: white; cursor: pointer; }
    .menu-item { padding: 12px 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #b0b3b8; }
    .menu-item:hover { background: #1e2128; }
    .submenu { padding-left: 40px; display: none; }
    .submenu.open { display: block; }
    .main-content { margin-left: 260px; transition: 0.3s; min-height: 100vh; }
    .main-content.expanded { margin-left: 0; }
    .top-bar { background: #0f1117; padding: 12px 20px; border-bottom: 1px solid #2a2f3b; display: flex; justify-content: space-between; }
    .menu-toggle { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    .content { padding: 20px; }
    .card { background: #13161f; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2f3b; }
    button { background: #3b82f6; border: none; padding: 8px 16px; border-radius: 6px; color: white; cursor: pointer; margin: 5px; }
    input, select, textarea { background: #1e2128; border: 1px solid #2a2f3b; padding: 8px; border-radius: 6px; color: white; width: 100%; margin: 5px 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #2a2f3b; }
    .modal { display: none; position: fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:2000;justify-content:center;align-items:center; }
    .modal-content { background: #13161f; padding: 20px; border-radius: 12px; max-width: 500px; width: 90%; }
    .flex { display: flex; gap: 10px; flex-wrap: wrap; }
    .progress-bar { width: 100%; height: 8px; background: #2a2f3b; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #3b82f6; width: 0%; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div id="app"></div>
<script>
let currentUser = null;
let token = localStorage.getItem('token');

// Menu principal
const menuItems = [
  { name: 'Home', icon: 'fa-home', module: 'dashboard' },
  { name: 'Configurações', icon: 'fa-cog', module: 'config', submenu: ['Categorias', 'Usuários associados', 'CDN'] },
  { name: 'Aplicativo', icon: 'fa-mobile-alt', module: 'app', submenu: ['Gerar APK', 'Temas da comunidade'] },
  { name: 'Textos', icon: 'fa-paragraph', module: 'texts' },
  { name: 'Notificações', icon: 'fa-bell', module: 'notifications' },
  { name: 'Dispositivos', icon: 'fa-laptop', module: 'devices' },
  { name: 'Sessões', icon: 'fa-history', module: 'sessions' },
  { name: 'Perfil', icon: 'fa-user', module: 'profile' }
];

function renderSidebar() {
  let html = '<div class="sidebar" id="sidebar"><div class="sidebar-header"><h2>ADM PAINEL</h2><button class="close-sidebar" onclick="toggleSidebar()"><i class="fas fa-chevron-left"></i></button></div>';
  menuItems.forEach(item => {
    if (item.submenu) {
      html += `<div><div class="menu-item" onclick="toggleSubmenu(this)"><i class="fas ${item.icon}"></i> ${item.name} <i class="fas fa-chevron-down" style="margin-left:auto"></i></div><div class="submenu">`;
      item.submenu.forEach(sub => { html += `<div class="menu-item" onclick="loadModule('${sub.toLowerCase().replace(/ /g, '_')}')">${sub}</div>`; });
      html += `</div></div>`;
    } else {
      html += `<div class="menu-item" onclick="loadModule('${item.module}')"><i class="fas ${item.icon}"></i> ${item.name}</div>`;
    }
  });
  html += '</div>';
  return html;
}

function toggleSubmenu(el) { el.nextElementSibling.classList.toggle('open'); }
function toggleSidebar() {
  document.getElementById('sidebar')?.classList.toggle('collapsed');
  document.getElementById('mainContent')?.classList.toggle('expanded');
}

// Carregar módulos
async function loadModule(module) {
  const content = document.getElementById('pageContent');
  if (!content) return;
  const token = localStorage.getItem('token');

  // DASHBOARD
  if (module === 'dashboard') {
    const stats = await fetch('/api/stats', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => ({}));
    content.innerHTML = `
      <div class="card"><h2>📊 Dashboard</h2><p>Bem-vindo, ${currentUser?.username}</p><p>Utilizadores: ${stats.users || 0}</p><p>Dispositivos: ${stats.devices || 0}</p><p>Sessões ativas: ${stats.sessions || 0}</p></div>
    `;
    return;
  }

  // CATEGORIAS
  if (module === 'categorias') {
    let cats = await fetch('/api/categories', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => []);
    content.innerHTML = `
      <div class="card"><h2>Categorias</h2><button onclick="addCategory()">+ Nova categoria</button><div id="catsList">${cats.map(c => `<div>${c.name} <button onclick="delCat(${c.id})">X</button></div>`).join('')}</div></div>
    `;
    window.addCategory = async () => {
      const name = prompt('Nome da categoria');
      if (name) await fetch('/api/categories', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({ name }) });
      loadModule('categorias');
    };
    window.delCat = async (id) => { await fetch(`/api/categories/${id}`, { method:'DELETE', headers:{'Authorization':`Bearer ${token}`} }); loadModule('categorias'); };
    return;
  }

  // USUÁRIOS ASSOCIADOS
  if (module === 'usuários_associados') {
    let users = await fetch('/api/users', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => []);
    content.innerHTML = `<div class="card"><h2>Usuários associados</h2>${users.map(u => `<div>${u.username} - ${u.role}</div>`).join('')}</div>`;
    return;
  }

  // CDN
  if (module === 'cdn') {
    let cdns = await fetch('/api/cdn', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => []);
    content.innerHTML = `<div class="card"><h2>CDN</h2><button onclick="addCdn()">+ Nova CDN</button><div id="cdnList">${cdns.map(c => `<div>${c.name} - ${c.url} <button onclick="delCdn(${c.id})">X</button></div>`).join('')}</div></div>`;
    window.addCdn = async () => {
      const name = prompt('Nome');
      const url = prompt('URL');
      if (name && url) await fetch('/api/cdn', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({ name, url }) });
      loadModule('cdn');
    };
    window.delCdn = async (id) => { await fetch(`/api/cdn/${id}`, { method:'DELETE', headers:{'Authorization':`Bearer ${token}`} }); loadModule('cdn'); };
    return;
  }

  // GERAR APK
  if (module === 'gerar_apk') {
    content.innerHTML = `
      <div class="card"><h2>Gerar APK</h2>
      <input id="apkName" placeholder="Nome do APK" value="AuraVP">
      <input id="packageName" placeholder="Pacote" value="com.auravp.app">
      <input id="versionName" placeholder="Versão" value="1.0.0">
      <input id="versionCode" placeholder="Código" value="1">
      <button id="buildBtn">Gerar APK</button>
      <div id="buildProgress" style="display:none"><div class="progress-bar"><div class="progress-fill" id="buildFill"></div></div><div id="buildLogs"></div></div>
      </div>
    `;
    document.getElementById('buildBtn')?.addEventListener('click', async () => {
      const div = document.getElementById('buildProgress');
      div.style.display = 'block';
      const fill = document.getElementById('buildFill');
      const logs = document.getElementById('buildLogs');
      for (let i = 0; i <= 100; i+=20) {
        fill.style.width = i+'%';
        logs.innerHTML += `<div>Progresso: ${i}%</div>`;
        await new Promise(r => setTimeout(r, 500));
      }
      logs.innerHTML += `<div>✅ APK gerado! <a href="#">Download</a></div>`;
    });
    return;
  }

  // TEMAS DA COMUNIDADE
  if (module === 'temas_da_comunidade') {
    let themes = await fetch('/api/themes', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => []);
    content.innerHTML = `
      <div class="card"><h2>Temas da comunidade</h2><button onclick="publishTheme()">Publicar tema</button>
      ${themes.map(t => `<div><strong>${t.name}</strong><br>${t.description}<br><small>${t.author}</small></div>`).join('')}
      </div>
    `;
    window.publishTheme = async () => {
      const name = prompt('Nome do tema');
      const desc = prompt('Descrição');
      if (name) await fetch('/api/themes', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({ name, description: desc, author: currentUser?.username }) });
      loadModule('temas_da_comunidade');
    };
    return;
  }

  // TEXTOS
  if (module === 'texts') {
    let texts = await fetch('/api/texts', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => ({}));
    content.innerHTML = `<div class="card"><h2>Textos</h2><div id="textsList">${Object.entries(texts).map(([k,v]) => `<div><strong>${k}</strong><br>PT: <input value="${v.pt||''}" id="pt_${k}"><br>EN: <input value="${v.en||''}" id="en_${k}"><button onclick="saveText('${k}')">Salvar</button></div>`).join('')}</div></div>`;
    window.saveText = async (key) => {
      const pt = document.getElementById(`pt_${key}`).value;
      const en = document.getElementById(`en_${key}`).value;
      await fetch(`/api/texts/${key}`, { method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({ pt, en }) });
      alert('Salvo');
    };
    return;
  }

  // NOTIFICAÇÕES
  if (module === 'notifications') {
    let nots = await fetch('/api/notifications', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => []);
    content.innerHTML = `
      <div class="card"><h2>Notificações</h2><button onclick="sendNotif()">Enviar</button><div id="notifList">${nots.map(n => `<div><strong>${n.title}</strong><br>${n.message}</div>`).join('')}</div></div>
    `;
    window.sendNotif = async () => {
      const title = prompt('Título');
      const message = prompt('Mensagem');
      if (title && message) await fetch('/api/notifications', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({ title, message, type:'info' }) });
      loadModule('notifications');
    };
    return;
  }

  // DISPOSITIVOS
  if (module === 'dispositivos') {
    let devices = await fetch('/api/devices', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => []);
    content.innerHTML = `<div class="card"><h2>Dispositivos</h2>${devices.map(d => `<div>${d.name} - ${d.user} - ${d.online ? 'Online' : 'Offline'}</div>`).join('')}</div>`;
    return;
  }

  // SESSÕES
  if (module === 'sessões') {
    let sessions = await fetch('/api/sessions', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => []);
    content.innerHTML = `<div class="card"><h2>Sessões</h2>${sessions.map(s => `<div>${s.device} - ${s.ip} <button onclick="endSession(${s.id})">Terminar</button></div>`).join('')}</div>`;
    window.endSession = async (id) => { await fetch(`/api/sessions/${id}`, { method:'DELETE', headers:{'Authorization':`Bearer ${token}`} }); loadModule('sessões'); };
    return;
  }

  // PERFIL
  if (module === 'profile') {
    let me = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => ({}));
    content.innerHTML = `<div class="card"><h2>Perfil</h2><p>Nome: ${me.username}</p><p>Email: ${me.email}</p><p>Tipo: ${me.role}</p><button onclick="changePass()">Alterar senha</button></div>`;
    window.changePass = () => { alert('Funcionalidade em breve'); };
    return;
  }

  content.innerHTML = `<div class="card"><h2>${module}</h2><p>Módulo em desenvolvimento</p></div>`;
}

// LOGIN
async function init() {
  if (!token) {
    document.getElementById('app').innerHTML = `<div style="display:flex;justify-content:center;align-items:center;height:100vh"><div class="card"><h2>Login</h2><input id="loginUser" placeholder="Usuário"><input id="loginPass" type="password" placeholder="Senha"><button onclick="doLogin()">Entrar</button><div id="loginError"></div></div></div>`;
    window.doLogin = async () => {
      const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ username:document.getElementById('loginUser').value, password:document.getElementById('loginPass').value }) });
      const data = await res.json();
      if (res.ok) { localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data)); location.reload(); }
      else document.getElementById('loginError').innerText = data.error;
    };
    return;
  }
  currentUser = JSON.parse(localStorage.getItem('user'));
  document.getElementById('app').innerHTML = renderSidebar() + `<div class="main-content" id="mainContent"><div class="top-bar"><button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button><div class="user-info"><span>${currentUser.username}</span><button class="logout-btn" onclick="logout()">Sair</button></div></div><div class="content" id="pageContent"></div></div>`;
  loadModule('dashboard');
}

window.logout = () => { localStorage.clear(); location.reload(); };
init();
</script>
</body>
</html>
