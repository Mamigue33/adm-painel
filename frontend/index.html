<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM PAINEL - AuraVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .error {
            color: #c33;
            text-align: center;
            margin-top: 10px;
        }
        
        .dashboard {
            display: none;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .logout-btn {
            background: #dc3545;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const API_URL = '';
        
        // Estado da aplicação
        let currentUser = null;
        
        async function login(username, password) {
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    currentUser = data;
                    renderDashboard();
                    return { success: true };
                } else {
                    return { success: false, error: data.error };
                }
            } catch (error) {
                return { success: false, error: 'Erro ao conectar ao servidor' };
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            currentUser = null;
            renderLogin();
        }
        
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-card">
                        <h1>🚀 ADM PAINEL</h1>
                        <p style="text-align:center; color:#666; margin-bottom:20px">AuraVP - Centro de Controlo</p>
                        <input type="text" id="username" placeholder="Usuário">
                        <input type="password" id="password" placeholder="Senha">
                        <button onclick="doLogin()">Entrar</button>
                        <div id="errorMsg" class="error"></div>
                    </div>
                </div>
            `;
        }
        
        async function renderDashboard() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (!user) {
                renderLogin();
                return;
            }
            
            // Buscar estatísticas
            let statsHtml = '<p>Carregando...</p>';
            try {
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                statsHtml = `
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;">
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; text-align: center;">
                            <h3 style="font-size: 28px;">${stats.users_count}</h3>
                            <p>Utilizadores</p>
                        </div>
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; text-align: center;">
                            <h3 style="font-size: 28px;">${stats.version}</h3>
                            <p>Versão</p>
                        </div>
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; text-align: center;">
                            <h3 style="font-size: 28px;">✅</h3>
                            <p>Online</p>
                        </div>
                    </div>
                `;
            } catch (error) {
                statsHtml = '<div class="card"><p>❌ Erro ao carregar estatísticas</p></div>';
            }
            
            document.getElementById('app').innerHTML = `
                <div style="max-width: 1200px; margin: 0 auto; padding: 20px;">
                    <div style="background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                        <h1>🚀 ADM PAINEL - AuraVP</h1>
                        <div>
                            <span style="margin-right: 15px;">👤 ${user.username} (${user.role})</span>
                            <button onclick="logout()" style="background: #dc3545; padding: 8px 15px;">Sair</button>
                        </div>
                    </div>
                    
                    ${statsHtml}
                    
                    <div class="card">
                        <h2>📊 Sistema Operacional</h2>
                        <p>Servidor: Online</p>
                        <p>Timestamp: ${new Date().toLocaleString()}</p>
                    </div>
                    
                    <div class="card">
                        <h2>🎯 Próximos Passos</h2>
                        <p>✅ Sistema de login funcionando</p>
                        <p>⏳ Gestão de servidores (em breve)</p>
                        <p>⏳ App Builder (em breve)</p>
                        <p>⏳ Editor Visual (em breve)</p>
                    </div>
                </div>
            `;
        }
        
        window.doLogin = async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const result = await login(username, password);
            if (!result.success) {
                document.getElementById('errorMsg').innerText = result.error;
            }
        };
        
        // Iniciar app
        const token = localStorage.getItem('token');
        if (token) {
            renderDashboard();
        } else {
            renderLogin();
        }
    </script>
</body>
</html>
